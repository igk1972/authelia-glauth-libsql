---
# Authelia config for the libsql stack.
# - authentication backend: glauth over LDAP (:10020)
# - storage: libsql/sqld (authelia namespace, via Caddy :10000)
# - session: libsql/sqld (sessions persisted in the same namespace)
# Secrets (session/storage/jwt/ldap password) live in config/authelia/secrets.env
# (gitignored, copied from secrets.env.example) and are read as AUTHELIA_* env vars.

theme: 'light'

server:
  address: 'tcp://127.0.0.1:10010'
  # TLS is required because Authelia mandates an https 'authelia_url'. Self-signed
  # cert for auth.example.com is generated by `mise run setup:tls`. Paths are
  # relative to the working directory (mise runs tasks from the project root).
  tls:
    certificate: 'deploy/authelia/tls/cert.pem'
    key: 'deploy/authelia/tls/key.pem'

log:
  level: 'debug'

# identity_validation.reset_password.jwt_secret is provided via secrets.env
# (env AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET).

totp:
  issuer: 'authelia.localhost'

authentication_backend:
  ldap:
    implementation: 'custom'
    address: 'ldap://127.0.0.1:10020'
    base_dn: 'dc=glauth,dc=com'
    additional_users_dn: 'ou=users'
    users_filter: '(&({username_attribute}={input})(objectClass=posixAccount))'
    additional_groups_dn: 'ou=groups'
    groups_filter: '(&(uniqueMember={dn})(objectClass=posixGroup))'
    username_attribute: 'cn'
    mail_attribute: 'mail'
    display_name_attribute: 'givenName'
    group_name_attribute: 'cn'
    user: 'cn=john,dc=glauth,dc=com'
    # password comes from secrets.env (AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD)

access_control:
  default_policy: 'one_factor'

session:
  # secret comes from secrets.env (AUTHELIA_SESSION_SECRET)
  cookies:
    - domain: 'example.com'
      authelia_url: 'https://auth.example.com:10010'
      default_redirection_url: 'https://auth.example.com:10010/'
  libsql:
    url: 'http://localhost:10000/authelia'

regulation:
  max_retries: 3
  find_time: '2 minutes'
  ban_time: '5 minutes'

storage:
  # encryption_key comes from secrets.env (AUTHELIA_STORAGE_ENCRYPTION_KEY)
  libsql:
    url: 'http://localhost:10000/authelia'

notifier:
  filesystem:
    filename: '/tmp/authelia-notification.txt'
