#################
# glauth config for the libsql stack.
# Backend is the compiled-in libsql datastore (datastore = "embed", built with
# the embedlibsql tag). All directory data lives in the sqld "glauth" namespace,
# reached through the Caddy ingress at http://localhost:10000/glauth.

debug = true

[ldap]
  enabled = true
  listen = "127.0.0.1:10020"

[ldaps]
  enabled = false

[backend]
  datastore = "embed"
  baseDN = "dc=glauth,dc=com"
  # libsql DSN (go-libsql driver). Namespace selection is by URL path via Caddy.
  database = "http://localhost:10000/glauth"
  # nameformat defaults to "cn,uid", groupformat to "ou,cn".
  # Allow anonymous Root DSE queries (Authelia probes the Root DSE before binding).
  anonymousdse = true

[api]
  enabled = false
